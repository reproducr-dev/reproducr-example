name: R-CMD-check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'
          use-public-rspm: true

      - name: Install reproducr
        run: Rscript -e "pak::pkg_install('ndohpenngit/reproducr', ask = FALSE)"

      - name: Run analysis
        run: Rscript analysis.R

      - name: Run tests
        run: Rscript -e "testthat::test_file('tests/test-analysis.R')"
