name: R-CMD-check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'
          use-public-rspm: true

      - name: Install dependencies
        run: |
          Rscript -e "install.packages(c('palmerpenguins', 'testthat', 'here'))"

      - name: Install reproducr
        run: Rscript -e "remotes::install_github('ndohpenngit/reproducr', quiet = TRUE)"

      - name: Install remotes
        run: Rscript -e "install.packages('remotes')"

      - name: Run analysis
        run: Rscript analysis.R

      - name: Run tests
        run: Rscript -e "testthat::test_file('tests/test-analysis.R')"
