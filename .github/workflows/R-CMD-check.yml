name: R-CMD-check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'
          use-public-rspm: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libssl-dev libxml2-dev

      - name: Install packages
        env:
          GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
        run: |
          Rscript -e "
            install.packages('remotes')
            install.packages(c('palmerpenguins', 'testthat', 'here'))
            remotes::install_github('ndohpenngit/reproducr',
                                    quiet        = TRUE,
                                    force        = TRUE,
                                    dependencies = TRUE)
          "

      - name: Run analysis
        run: Rscript analysis.R

      - name: Run tests
        run: Rscript -e "testthat::test_file('tests/test-analysis.R')"