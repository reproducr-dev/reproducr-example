name: Reproducibility audit

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'   # Weekly on Monday at 06:00 UTC

jobs:
  audit:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'
          use-public-rspm: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libssl-dev libxml2-dev

      - name: Install packages
        env:
          GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
        run: |
          Rscript -e "
            install.packages('remotes')
            install.packages(c('palmerpenguins', 'here'))
            remotes::install_github('ndohpenngit/reproducr',
                                    quiet        = TRUE,
                                    force        = TRUE,
                                    dependencies = TRUE)
          "

      - name: Run analysis and audit
        run: |
          Rscript -e "
            library(reproducr)

            source('analysis.R')

            report <- audit_script('analysis.R', renv = FALSE, verbose = FALSE)
            risks  <- risk_score(report)

            if (file.exists('.reproducr.rds')) {
              drift <- check_drift(OUTPUTS, against = 'latest')
              if (any(drift\$status == 'drifted')) {
                warning('Output drift detected since last certified run.')
              }
            } else {
              drift <- NULL
              message('No prior certification — establishing baseline.')
            }

            certify(
              outputs = OUTPUTS,
              tag     = paste0('ci-', Sys.Date()),
              script  = 'analysis.R'
            )

            repro_badge(report, risks, drift = drift, output = 'README')
            repro_report(
              report, risks, drift = drift,
              format      = 'md',
              style       = 'minimal',
              output_file = 'reproducibility_report.md'
            )

            n_high <- sum(risks\$risk == 'high', na.rm = TRUE)
            if (n_high > 0L) {
              warning(n_high, ' high-severity reproducibility risk(s) detected.')
            }
          "

      - name: Commit audit results
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add README.md reproducibility_report.md .reproducr.rds
          git diff --staged --quiet || \
            git commit -m 'chore: update reproducibility audit [skip ci]'
          git push